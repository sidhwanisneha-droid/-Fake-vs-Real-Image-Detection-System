<!DOCTYPE html>
<html>
<head>
    <title>Fake vs Real Detector</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f1eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            color: #5c4033;
        }

        .upload-box {
            border: 2px dashed #5c4033;
            padding: 30px;
            border-radius: 10px;
            cursor: pointer;
            color: #5c4033;
            margin: 20px 0;
        }

        input {
            display: none;
        }

        button {
            background: #5c4033;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        img {
            width: 200px;
            margin-top: 15px;
            border-radius: 10px;
        }

        #result {
            margin-top: 15px;
            color: #5c4033;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Fake vs Real Detector</h2>

    <label class="upload-box">
        Click to Upload Image
        <input type="file" id="fileInput">
    </label>

    <button onclick="upload()">Predict</button>

    <img id="preview" style="display:none">

    <div id="result"></div>
</div>

<script>
function upload() {
    let file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Upload image first!");
        return;
    }

    let preview = document.getElementById("preview");
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    let formData = new FormData();
    formData.append("file", file);

    fetch("/predict", {   // 🔥 IMPORTANT CHANGE (NO FULL URL)
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            data.prediction + " (" + data.confidence + "%)";
    })
    .catch(err => {
        alert("Something went wrong!");
    });
}
</script>

</body>
</html>
